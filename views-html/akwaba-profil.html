<!DOCTYPE html>
<html class="light" lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akwaba - Mon profil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#f9f9f9",
            "on-surface-variant": "#40493d",
            "surface-container-high": "#e8e8e8",
            "surface-container-low": "#f3f3f3",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#1a1c1c",
            "on-primary": "#ffffff",
            primary: "#00569f",
            secondary: "#106d20",
            "on-secondary-container": "#1a7425",
            "secondary-container": "#9df898",
            outline: "#707a6c",
            tertiary: "#993300",
            "on-tertiary": "#ffffff",
          },
          fontFamily: {
            body: ["Lexend", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    body {
      font-family: Lexend, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .icon-filled {
      font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24;
    }
  </style>
</head>
<body class="min-h-screen bg-background pb-36 text-on-surface antialiased">
  <header class="sticky top-0 z-40 flex h-16 w-full items-center justify-between border-b border-stone-200/80 bg-surface-container-lowest px-4 dark:border-stone-800">
    <button type="button" class="flex h-10 w-10 items-center justify-center rounded-full transition-colors active:bg-surface-container-high" aria-label="Retour">
      <span class="material-symbols-outlined text-2xl text-primary">arrow_back</span>
    </button>
    <h1 class="font-body text-lg font-bold text-primary">Mon profil</h1>
    <button type="button" class="flex h-10 w-10 items-center justify-center rounded-full transition-colors active:bg-surface-container-high" aria-label="Modifier le profil">
      <span class="material-symbols-outlined text-2xl text-primary">edit</span>
    </button>
  </header>
  <main class="mx-auto max-w-2xl space-y-6 px-4 pt-6">
    <!-- En-tête profil -->
    <section class="flex flex-col items-center text-center">
      <div class="relative">
        <div class="h-28 w-28 overflow-hidden rounded-full border-4 border-white shadow-md ring-2 ring-primary/20">
          <img
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuA04e9qh3POP56_jnkw39IsA6WvYqEWS9vs6HZAa6y8an3Cgbp8YQx4bdTiPHAB81bezdAnxsi0_DQduEfgjmrVojBbD7UJOwUgJ_sDjB6PMMWbJ0lySMNMqGDQa1fpUR2_9_yeV0HRztI14l4PupsluGPMoBZmgz5aqJHdONv2danzeSxWgQoLcEaBygNclZlnJN_mX-GKT7lKfLR9aO0xX3liAYtIy5bd5eOMFfbWS0k6xwo9QICY6sFxSv9dXQHxj4EJrwkFnzM"
            alt="Photo de profil de Papa Koffi"
            class="h-full w-full object-cover"
            width="112"
            height="112"
          />
        </div>
        <span class="absolute bottom-1 right-1 flex h-7 w-7 items-center justify-center rounded-full bg-secondary-container text-on-secondary-container shadow-sm" title="Carte active">
          <span class="material-symbols-outlined icon-filled text-base">verified</span>
        </span>
      </div>
      <h2 class="mt-4 font-body text-2xl font-black tracking-tight">Papa Koffi</h2>
      <p class="mt-1 text-sm font-medium text-on-surface-variant">Carte Senior · AKB-SR-00241</p>
    </section>
    <!-- Infos principales -->
    <section class="space-y-3" aria-labelledby="infos-title">
      <h2 id="infos-title" class="px-1 text-sm font-bold uppercase tracking-wider text-on-surface-variant">Informations</h2>
      <div class="overflow-hidden rounded-3xl border border-black/[0.06] bg-white shadow-sm">
        <div class="flex items-center gap-4 border-b border-black/[0.06] p-4">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-primary/10 text-primary">
            <span class="material-symbols-outlined text-2xl">call</span>
          </div>
          <div class="min-w-0 flex-1">
            <p class="text-xs font-semibold text-on-surface-variant">Téléphone</p>
            <p class="truncate font-semibold text-on-surface">+225 07 12 34 56 78</p>
          </div>
        </div>
        <div class="flex items-center gap-4 border-b border-black/[0.06] p-4">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-primary/10 text-primary">
            <span class="material-symbols-outlined text-2xl">mail</span>
          </div>
          <div class="min-w-0 flex-1">
            <p class="text-xs font-semibold text-on-surface-variant">E-mail</p>
            <p class="truncate font-semibold text-on-surface">papa.koffi@email.com</p>
          </div>
        </div>
        <div class="flex items-center gap-4 border-b border-black/[0.06] p-4">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-primary/10 text-primary">
            <span class="material-symbols-outlined text-2xl">cake</span>
          </div>
          <div class="min-w-0 flex-1">
            <p class="text-xs font-semibold text-on-surface-variant">Date de naissance</p>
            <p class="font-semibold text-on-surface">15 mars 1952</p>
          </div>
        </div>
        <div class="flex items-center gap-4 p-4">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-primary/10 text-primary">
            <span class="material-symbols-outlined text-2xl">location_on</span>
          </div>
          <div class="min-w-0 flex-1">
            <p class="text-xs font-semibold text-on-surface-variant">Ville</p>
            <p class="font-semibold text-on-surface">Abidjan</p>
          </div>
        </div>
      </div>
    </section>
    <!-- Carte & validité -->
    <section class="space-y-3" aria-labelledby="carte-title">
      <h2 id="carte-title" class="px-1 text-sm font-bold uppercase tracking-wider text-on-surface-variant">Ma carte</h2>
      <div class="rounded-3xl border border-black/[0.06] bg-gradient-to-br from-primary to-[#004080] p-5 text-on-primary shadow-lg shadow-primary/20">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-medium text-white/80">Statut</p>
            <p class="mt-1 text-lg font-black">ACTIF</p>
          </div>
          <span class="material-symbols-outlined icon-filled text-4xl text-white/90">badge</span>
        </div>
        <p class="mt-4 text-sm text-white/85">Expire le <span class="font-bold text-white">31 décembre 2026</span></p>
      </div>
    </section>
    <!-- Actions -->
    <section class="space-y-3 pb-4" aria-label="Actions du profil">
      <button type="button" class="flex w-full items-center justify-between rounded-3xl border border-black/[0.06] bg-white p-4 text-left shadow-sm transition active:bg-surface-container-low">
        <span class="flex items-center gap-3">
          <span class="material-symbols-outlined text-2xl text-outline">notifications</span>
          <span class="font-bold">Notifications</span>
        </span>
        <span class="material-symbols-outlined text-outline">chevron_right</span>
      </button>
      <button type="button" class="flex w-full items-center justify-between rounded-3xl border border-black/[0.06] bg-white p-4 text-left shadow-sm transition active:bg-surface-container-low">
        <span class="flex items-center gap-3">
          <span class="material-symbols-outlined text-2xl text-outline">lock</span>
          <span class="font-bold">Confidentialité</span>
        </span>
        <span class="material-symbols-outlined text-outline">chevron_right</span>
      </button>
      <button type="button" class="flex w-full items-center justify-between rounded-3xl border border-black/[0.06] bg-white p-4 text-left shadow-sm transition active:bg-surface-container-low">
        <span class="flex items-center gap-3">
          <span class="material-symbols-outlined text-2xl text-outline">help</span>
          <span class="font-bold">Aide &amp; support</span>
        </span>
        <span class="material-symbols-outlined text-outline">chevron_right</span>
      </button>
      <button type="button" class="mt-2 flex w-full items-center justify-center gap-2 rounded-3xl border border-error/30 bg-error-container py-4 font-bold text-error transition active:opacity-90">
        <span class="material-symbols-outlined text-xl">logout</span>
        Se déconnecter
      </button>
    </section>
  </main>
