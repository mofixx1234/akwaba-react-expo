<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#F5FBFB",
                        "primary": "#00569f",
                        "secondary": "#26C6DA",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#40493d",
                        "surface-container-highest": "#ffffff",
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Lexend"],
                        "body": ["Lexend"],
                        "label": ["Lexend"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Lexend', sans-serif;
        }

        .blob {
            position: absolute;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.4;
        }
    </style>
</head>

<body class="bg-background text-on-surface min-h-screen flex flex-col relative overflow-hidden">
    <!-- Background Shapes -->
    <div class="blob w-[300px] h-[300px] bg-secondary rounded-full -top-20 -left-20"></div>
    <div class="blob w-[250px] h-[250px] bg-primary rounded-full top-1/4 -right-20"></div>
    <div class="blob w-[400px] h-[400px] bg-secondary rounded-full -bottom-40 left-1/2 -translate-x-1/2"></div>
    <main class="flex-grow flex flex-col items-center px-6 py-12 max-w-md mx-auto w-full z-10">
        <!-- Logo Section -->
        <div class="mb-10 text-center">
            <h1 class="text-primary font-black text-4xl tracking-tighter mb-1">Akwaba Senior</h1>
            <p class="text-on-surface-variant text-lg font-medium">Bienvenue chez vous</p>
        </div>
        <!-- Login Card -->
        <div
            class="w-full bg-white/70 backdrop-blur-md p-8 rounded-xl shadow-xl shadow-primary/5 border border-white/50">
            <h2 class="text-2xl font-bold text-center text-on-surface mb-8">Se connecter</h2>
            <div class="space-y-6">
                <div class="flex flex-col space-y-2">
                    <label class="text-on-surface-variant font-semibold text-sm ml-1" for="phone">Numéro de
                        téléphone</label>
                    <div class="relative flex items-center group">
                        <span
                            class="absolute left-4 material-symbols-outlined text-secondary text-2xl transition-colors group-focus-within:text-primary"
                            data-icon="phone">phone</span>
                        <input
                            class="w-full h-14 pl-12 pr-4 bg-white border border-gray-100 rounded-full text-lg focus:ring-2 focus:ring-secondary/30 focus:border-secondary outline-none transition-all text-on-surface placeholder:text-gray-300 shadow-sm"
                            id="phone" placeholder="01 23 45 67 89" type="tel" />
                    </div>
                </div>
                <button
                    class="w-full h-14 bg-primary text-white rounded-full text-lg font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
                    Se connecter
                </button>
                <div class="text-center pt-2">
                    <button class="text-secondary font-bold text-sm hover:underline decoration-2 underline-offset-4">
                        Créer un compte
                    </button>
                </div>
            </div>
        </div>
        <!-- Language Selector -->
        <div
            class="mt-12 flex items-center gap-2 bg-gray-100/50 p-1.5 rounded-full border border-gray-200/30 backdrop-blur-sm">
            <button
                class="flex items-center gap-2 px-6 py-2 bg-white text-primary rounded-full font-bold shadow-sm text-sm">
                <span class="material-symbols-outlined text-lg" data-icon="language">language</span>
                <span>Français</span>
            </button>
            <button
                class="px-6 py-2 text-on-surface-variant font-semibold text-sm hover:text-primary transition-colors">
                English
            </button>
        </div>
    </main>
    <!-- Support Section -->
    <footer class="p-8 text-center mt-auto z-10">
        <div class="flex flex-col items-center gap-4">
            <div class="relative">
                <div class="w-20 h-20 rounded-full bg-secondary p-1 shadow-lg">
                    <div class="w-full h-full rounded-full overflow-hidden bg-white border-2 border-white">
                        <img alt="Support Client" class="w-full h-full object-cover"
                            data-alt="Close-up of a smiling professional woman with a headset, warm indoor office lighting, high-end editorial photography style"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2HhIg_jKcKivgXGSvBbu3BuB2rFqser9WaJ0OJfEPn02VqiOXxzMlHr96-AyCR0nX48ymVm671hbgCBddvkrK6r30Dc1VYh9Tp0YtpLAMgxj-UQrMI2137y0fQdA3jJ6HstuLVSq1BQHGng8WVcHK4crQ7ygnJSJaPcvlX6eXbvvaRvynkGZ_sU6zHwqqXGUUlOgFh7V-6LS0Zwveyfpt4KZ-Jn0mAfdjlVmWiIxaegZhQ1AnONJlfATig_xs0JPp5TzempQIK9k" />
                    </div>
                </div>
                <!-- Status indicator -->
                <div class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></div>
            </div>
            <p class="text-on-surface-variant font-medium text-sm max-w-[240px] mx-auto leading-relaxed">
                Besoin d'aide ? Nos conseillers Akwaba sont là pour vous.
            </p>
        </div>
    </footer>
</body>

</html>
