<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Akwaba - Accueil</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f9f9f9",
                        "primary-fixed": "#d4e3ff",
                        "on-surface-variant": "#40493d",
                        "surface-variant": "#e2e2e2",
                        "on-primary-fixed-variant": "#004786",
                        "outline-variant": "#bfcaba",
                        "on-primary": "#ffffff",
                        "primary-container": "#006eca",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2f3131",
                        "surface-container": "#eeeeee",
                        "tertiary-fixed": "#ffdbcf",
                        "inverse-on-surface": "#f1f1f1",
                        "secondary-fixed": "#9df898",
                        "secondary": "#106d20",
                        "on-tertiary-fixed": "#380d00",
                        "on-surface": "#1a1c1c",
                        "on-primary-fixed": "#001c3a",
                        "tertiary-container": "#c24300",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "on-secondary-fixed": "#002204",
                        "surface-bright": "#f9f9f9",
                        "surface": "#f9f9f9",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb59a",
                        "surface-dim": "#dadada",
                        "on-tertiary-fixed-variant": "#802a00",
                        "on-secondary-fixed-variant": "#005312",
                        "inverse-primary": "#a5c8ff",
                        "secondary-fixed-dim": "#82db7e",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-container": "#1a7425",
                        "on-primary-container": "#ecf1ff",
                        "surface-container-high": "#e8e8e8",
                        "outline": "#707a6c",
                        "surface-tint": "#005faf",
                        "on-background": "#1a1c1c",
                        "primary": "#00569f",
                        "on-tertiary-container": "#ffeee8",
                        "secondary-container": "#9df898",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#993300",
                        "primary-fixed-dim": "#a5c8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Lexend"],
                        "body": ["Lexend"],
                        "label": ["Lexend"]
                    }
                },
            }
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f9f9f9;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }

        .active-tab .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

<body class="text-on-surface antialiased pb-32">
    <!-- Header -->
    <header class="bg-surface flex items-center justify-between px-4 w-full h-16 sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full active:bg-surface-container-high transition-colors">
                <span class="material-symbols-outlined text-primary text-2xl" data-icon="arrow_back">arrow_back</span>
            </button>
            <h1 class="font-lexend text-xl font-bold text-primary tracking-tight">Akwaba</h1>
        </div>
        <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white shadow-sm">
            <img alt="Portrait of a smiling elderly man" class="w-full h-full object-cover"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuA04e9qh3POP56_jnkw39IsA6WvYqEWS9vs6HZAa6y8an3Cgbp8YQx4bdTiPHAB81bezdAnxsi0_DQduEfgjmrVojBbD7UJOwUgJ_sDjB6PMMWbJ0lySMNMqGDQa1fpUR2_9_yeV0HRztI14l4PupsluGPMoBZmgz5aqJHdONv2danzeSxWgQoLcEaBygNclZlnJN_mX-GKT7lKfLR9aO0xX3liAYtIy5bd5eOMFfbWS0k6xwo9QICY6sFxSv9dXQHxj4EJrwkFnzM" />
        </div>
    </header>
    <main class="px-4 max-w-2xl mx-auto space-y-6 mt-4">
        <!-- Welcome Section -->
        <section class="space-y-1">
            <h2 class="text-4xl font-black text-on-surface tracking-tight leading-tight">Bonjour Papa Koffi</h2>
            <p class="text-lg text-on-surface-variant font-medium">Comment allez-vous aujourd'hui ?</p>
        </section>
        <!-- Primary Actions: Cards -->
        <section class="grid grid-cols-1 gap-4">
            <!-- Map Card -->
            <button
                class="bg-[#00569f] text-white rounded-[24px] p-6 flex flex-col items-center justify-center space-y-4 shadow-lg shadow-blue-900/10 active:scale-95 transition-transform h-48"
                id="nav-to-carte-senior">
                <div class="bg-white/20 p-4 rounded-full">
                    <span class="material-symbols-outlined text-4xl" data-icon="map"
                        style="font-variation-settings: 'FILL' 1;">map</span>
                </div>
                <span class="text-xl font-bold tracking-tight">Carte Plan Vie Senior</span>
            </button>
            <!-- SOS Card -->
            <button
                class="bg-[#993300] text-white rounded-[24px] p-6 flex flex-col items-center justify-center space-y-4 shadow-lg shadow-orange-900/10 active:scale-95 transition-transform h-48">
                <div class="bg-white/20 p-4 rounded-full">
                    <span class="material-symbols-outlined text-5xl" data-icon="emergency"
                        style="font-variation-settings: 'FILL' 1;">emergency</span>
                </div>
                <span class="text-2xl font-black tracking-tight">SOS Urgence</span>
            </button>
        </section>
        <!-- Appointment Card -->
        <section class="space-y-3">
            <h3 class="text-xl font-bold text-on-surface px-1">Prochains rendez-vous</h3>
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-black/[0.03]">
                <div class="flex items-center gap-4">
                    <div
                        class="bg-secondary-container text-on-secondary-container p-3 rounded-2xl flex flex-col items-center justify-center min-w-[70px]">
                        <span class="text-[10px] font-bold uppercase tracking-wider opacity-70">Juin</span>
                        <span class="text-3xl font-black">12</span>
                    </div>
                    <div class="flex-1 space-y-1">
                        <div class="flex items-center gap-1.5 text-secondary font-bold text-sm">
                            <span class="material-symbols-outlined text-lg"
                                data-icon="medical_services">medical_services</span>
                            <span>Contrôle Santé Routine</span>
                        </div>
                        <p class="text-on-surface text-lg font-bold">Dr. Diallo - Cardiologue</p>
                        <div class="flex items-center gap-1.5 text-on-surface-variant text-sm font-medium">
                            <span class="material-symbols-outlined text-base" data-icon="schedule">schedule</span>
                            <span>09:30 — Clinique Akwaba</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Quick Access Buttons -->
        <section class="grid grid-cols-1 gap-3 pb-8">
            <button
                class="flex items-center justify-between bg-white border border-black/[0.03] p-5 rounded-3xl group active:bg-surface-container-low transition-colors shadow-sm"
                id="nav-to-carte-senior">
                <div class="flex items-center gap-4">
                    <div class="bg-secondary/10 p-3 rounded-2xl text-secondary">
                        <span class="material-symbols-outlined text-2xl" data-icon="spa">spa</span>
                    </div>
                    <span class="text-lg font-bold text-on-surface">Conseils bien-être</span>
                </div>
                <span
                    class="material-symbols-outlined text-2xl text-outline group-active:translate-x-1 transition-transform"
                    data-icon="chevron_right">chevron_right</span>
            </button>
            <button
                class="flex items-center justify-between bg-white border border-black/[0.03] p-5 rounded-3xl group active:bg-surface-container-low transition-colors shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="bg-primary/10 p-3 rounded-2xl text-primary">
                        <span class="material-symbols-outlined text-2xl" data-icon="contacts">contacts</span>
                    </div>
                    <span class="text-lg font-bold text-on-surface">Mes contacts</span>
                </div>
                <span
                    class="material-symbols-outlined text-2xl text-outline group-active:translate-x-1 transition-transform"
                    data-icon="chevron_right">chevron_right</span>
            </button><button
                class="flex items-center justify-between bg-white border border-black/[0.03] p-5 rounded-3xl group active:bg-surface-container-low transition-colors shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="bg-primary/10 p-3 rounded-2xl text-primary">
                        <span class="material-symbols-outlined text-2xl" data-icon="notifications">notifications</span>
                    </div>
                    <span class="text-lg font-bold text-on-surface">Notifications</span>
                </div>
                <span
                    class="material-symbols-outlined text-2xl text-outline group-active:translate-x-1 transition-transform"
                    data-icon="chevron_right">chevron_right</span>
            </button>
            <button
                class="flex items-center justify-between bg-white border border-black/[0.03] p-5 rounded-3xl group active:bg-surface-container-low transition-colors shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="bg-primary/10 p-3 rounded-2xl text-primary">
                        <span class="material-symbols-outlined text-2xl" data-icon="handshake">handshake</span>
                    </div>
                    <span class="text-lg font-bold text-on-surface">Nos partenaires</span>
                </div>
                <span
                    class="material-symbols-outlined text-2xl text-outline group-active:translate-x-1 transition-transform"
                    data-icon="chevron_right">chevron_right</span>
            </button>
        </section>
    </main>
    <!-- BottomNavBar -->
    <div
        class="fixed bottom-0 left-0 w-full z-50 bg-white/95 dark:bg-stone-900/95 backdrop-blur-md px-4 pb-4 pt-2 flex justify-around items-end shadow-[0_-8px_30px_rgba(0,0,0,0.05)]">
        <a aria-current="page"
            class="flex flex-col items-center justify-center rounded-2xl px-1 py-2 text-blue-900 transition active:scale-95 dark:text-blue-50"
            href="#">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">home</span>
            <span class="text-[11px] font-bold leading-none">Accueil</span>
        </a>
        <a class="flex flex-col items-center justify-center rounded-2xl px-1 py-2 text-stone-600 transition active:scale-95 dark:text-stone-400"
            href="#">
            <span class="material-symbols-outlined text-2xl">map</span>
            <span class="text-[11px] font-bold leading-none">Carte</span>
        </a>
        <div class="flex justify-center pb-1">
            <button aria-label="Ajouter"
                class="flex h-14 w-14 -translate-y-3 items-center justify-center rounded-full text-white shadow-lg transition active:scale-95 bg-[#00569f] shadow-[#00569f]/30"
                type="button">
                <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">add</span>
            </button>
        </div>
        <a class="flex flex-col items-center justify-center rounded-2xl px-1 py-2 text-stone-600 transition active:scale-95 dark:text-stone-400"
            href="#">
            <span class="material-symbols-outlined text-2xl">emergency</span>
            <span class="text-[11px] font-bold leading-none">SOS</span>
        </a>
        <a class="flex flex-col items-center justify-center rounded-2xl px-1 py-2 text-stone-600 transition active:scale-95 dark:text-stone-400"
            href="#">
            <span class="material-symbols-outlined text-2xl">person</span>
            <span class="text-[11px] font-bold leading-none">Profil</span>
        </a>
    </div>
</body>

</html>
