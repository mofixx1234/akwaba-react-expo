<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }

        body {
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#002204",
                        "tertiary-fixed-dim": "#ffb59a",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary-fixed": "#380d00",
                        "on-error-container": "#93000a",
                        "secondary-container": "#9df898",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary-fixed-variant": "#802a00",
                        "surface-container-low": "#f3f3f3",
                        "surface": "#f9f9f9",
                        "on-primary-fixed-variant": "#004786",
                        "on-tertiary-container": "#ffeee8",
                        "on-primary-container": "#ecf1ff",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f1f1f1",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "on-secondary-fixed-variant": "#005312",
                        "inverse-primary": "#a5c8ff",
                        "primary-fixed": "#d4e3ff",
                        "on-surface-variant": "#40493d",
                        "on-primary": "#ffffff",
                        "tertiary": "#993300",
                        "surface-bright": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "error": "#ba1a1a",
                        "secondary": "#106d20",
                        "surface-container": "#eeeeee",
                        "inverse-surface": "#2f3131",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#1a7425",
                        "secondary-fixed-dim": "#82db7e",
                        "on-primary-fixed": "#001c3a",
                        "surface-tint": "#005faf",
                        "on-background": "#1a1c1c",
                        "outline-variant": "#bfcaba",
                        "primary": "#00569f",
                        "secondary-fixed": "#9df898",
                        "primary-container": "#006eca",
                        "outline": "#707a6c",
                        "background": "#f9f9f9",
                        "tertiary-fixed": "#ffdbcf",
                        "on-surface": "#1a1c1c",
                        "tertiary-container": "#c24300",
                        "primary-fixed-dim": "#a5c8ff",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Lexend"],
                        "body": ["Lexend"],
                        "label": ["Lexend"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-between overflow-hidden">
    <!-- Top Navigation Bar (Simplified for transactional screen) -->
    <header class="flex items-center justify-between px-6 py-4 w-full dark:bg-stone-950 bg-blue-50">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-2xl text-[#00569f]">arrow_back</span>
            <h1 class="text-2xl font-bold font-lexend text-[#00569f]">Succès</h1>
        </div>
    </header>
    <!-- Main Content Canvas -->
    <main class="flex-grow flex flex-col items-center justify-center px-8 w-full max-w-md mx-auto space-y-16 pb-12">
        <!-- Large Green Checkmark (Hero Icon) -->
        <div class="relative">
            <div class="absolute inset-0 bg-secondary/10 rounded-full scale-150 blur-2xl"></div>
            <div
                class="relative w-32 h-32 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center shadow-lg">
                <span class="material-symbols-outlined text-7xl" data-weight="fill"
                    style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>
        </div>
        <!-- Success Message Cluster -->
        <div class="text-center space-y-6">
            <h2 class="text-[2.25rem] leading-tight font-extrabold tracking-tight text-on-surface">
                Félicitations, Papa Koffi !
            </h2>
            <div class="space-y-4">
                <p class="text-2xl font-semibold text-secondary leading-relaxed">
                    Votre compte Akwaba Senior a été créé avec succès.
                </p>
                <p class="text-xl text-stone-600 dark:text-stone-400 leading-relaxed max-w-xs mx-auto">
                    Vous pouvez maintenant accéder à tous vos avantages et services en toute sérénité.
                </p>
            </div>
        </div>
        <!-- Illustrative Success Asset -->
    </main>
    <!-- Fixed Bottom Action Area (Thumb-First Zone) -->
    <div class="w-full px-6 pb-12 pt-4 bg-white/50 backdrop-blur-sm">
        <button
            class="w-full h-[72px] bg-[#00569f] text-white rounded-full text-2xl font-bold shadow-[0_12px_24px_rgba(0,86,159,0.3)] active:scale-95 transition-transform flex items-center justify-center gap-3">
            <span>Aller à l'accueil</span>
            <span class="material-symbols-outlined text-3xl">chevron_right</span>
        </button>
    </div>
    <!-- Background Decoration (Sanctuary Aesthetic) -->
    <div class="fixed top-[-10%] right-[-20%] w-[80%] h-[50%] bg-blue-100/30 rounded-full blur-[100px] -z-10"></div>
    <div class="fixed bottom-[-5%] left-[-10%] w-[60%] h-[40%] bg-secondary/5 rounded-full blur-[80px] -z-10"></div>
</body>

</html>
